name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bunx tsc --noEmit
        env:
          # Minimal env to satisfy Zod parse at boot — values are placeholders, not secrets.
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_min_16_chars
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          GOOGLE_CLIENT_ID: ci-client-id
          MP_ACCESS_TOKEN: ci-mp-token
      - name: Unit tests
        run: bun run test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_min_16_chars
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          GOOGLE_CLIENT_ID: ci-client-id
          MP_ACCESS_TOKEN: ci-mp-token

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bun run typecheck
